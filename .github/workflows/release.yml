name: release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate release tag
        run: |
          set -euo pipefail
          python -m scripts.release_validate "${GITHUB_REF_NAME}"
      - name: Build release artifacts
        run: |
          set -euo pipefail
          python -m scripts.build --input-mode=hybrid --profile=full --deterministic --checksums
      - name: Create GitHub release and upload dist files
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: .github/release-notes-template.md
          files: |
            dist/**
